<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZaLo Smart - السوق الجزائري الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, doc, updateDoc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ3T-jWd_nj3FYCtzewRl-d1yimGtsryc",
            authDomain: "zalo-smart.firebaseapp.com",
            projectId: "zalo-smart",
            storageBucket: "zalo-smart.firebasestorage.app",
            messagingSenderId: "430326151788",
            appId: "1:430326151788:web:e4f94437946221429f3649",
            measurementId: "G-HVX2X346E7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firestoreTools = { collection, addDoc, getDocs, query, where, onSnapshot, doc, updateDoc, setDoc, deleteDoc, getDoc };
        window.firebaseAuthTools = { onAuthStateChanged, signInWithEmailAndPassword, signOut };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0b1528; color: #f3f4f6; }
        .zalo-emerald { background-color: #10b981; }
        .text-zalo-emerald { color: #10b981; }
        .border-zalo-emerald { border-color: #10b981; }
        .btn-primary { border: 2px solid #1e293b; color: white; padding: 12px 30px; border-radius: 12px; font-weight: bold; width: 100%; max-width: 320px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary:hover { background: rgba(255,255,255,0.05); border-color: #10b981; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 15px; width: 100%; max-width: 320px; color: white; margin-bottom: 15px; outline: none; }
        .input-field:focus { border-color: #10b981; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white">ZaLo <span class="text-zalo-emerald">Smart</span></h1>
            <p class="text-xs text-gray-400">سوق الجزائر الذكي</p>
        </div>
        <div class="text-center mb-10">
            <div class="w-48 h-48 bg-zalo-emerald/20 rounded-full flex items-center justify-center border-4 border-zalo-emerald/30 shadow-2xl shadow-zalo-emerald/20">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="Logo" class="w-32 h-32 object-contain">
            </div>
            <h2 class="mt-6 text-3xl font-black text-white">ZaLo</h2>
            <p class="text-zalo-emerald font-bold">(السوق الذكي)</p>
        </div>
        <div class="w-full flex flex-col items-center">
            <input type="email" id="login-email" placeholder="البريد الإلكتروني" class="input-field">
            <input type="password" id="login-password" placeholder="كلمة المرور" class="input-field">
            <button onclick="handleLogin()" class="btn-primary mt-4">
                <i class="fas fa-lock text-zalo-emerald"></i> ابدأ التسوق الآمن
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <!-- Top Nav -->
        <nav class="bg-[#0b1528] border-b border-white/5 p-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="zalo-emerald p-2 rounded-lg"><i class="fas fa-seedling text-white"></i></div>
                    <div><h1 class="font-bold">ZaLo Smart</h1><p class="text-[10px] text-gray-400">سوق الجزائر الذكي</p></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="switchTab('customer')" id="tab-customer" class="px-3 py-1.5 rounded-full text-xs font-bold bg-zalo-emerald text-white">مستهلك</button>
                    <button onclick="switchTab('merchant')" id="tab-merchant" class="px-3 py-1.5 rounded-full text-xs font-bold text-gray-400">تاجر</button>
                    <button onclick="switchTab('admin')" id="tab-admin" class="px-3 py-1.5 rounded-full text-xs font-bold text-gray-400">مدير</button>
                    <button onclick="handleLogout()" class="px-3 py-1.5 rounded-full text-xs font-bold text-red-400"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="app-content" class="flex-grow p-4 max-w-7xl mx-auto w-full">
            <!-- Content will be injected here -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
